version: "3"

services:
  cli:
    build: .
    volumes:
      - .:/app
    entrypoint: bash -c "cat example-mail.txt | php index.php"
    environment:
      RECIPIENT: test@gryfensee.ch

  composer:
    image: composer:2
    restart: 'no'
    command: bash -c "composer install --no-interaction --no-plugins --no-scripts --prefer-dist --no-suggest"
    volumes:
      - .:/app
      - composer-cache:/tmp/cache

volumes:
  composer-cache:
